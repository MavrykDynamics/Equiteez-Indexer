spec_version: 3.0

package: equiteez

database:
  kind: postgres
  host: 127.0.0.1
  port: '5437'
  user: dipdup
  password: dipdup12345
  database: dipdup
  schema_name: public
  connection_timeout: 60

hasura:
  url: http://127.0.0.1:42007
  allow_aggregations: false
  admin_secret: hasura12345
  select_limit: 1000
  rest: false

prometheus:
  host: 0.0.0.0
  port: 9090
  update_interval: 5

advanced:
  reindex:
    manual: wipe
    migration: exception
    rollback: ignore
    config_modified: ignore
    schema_modified: ignore
  http:
    retry_count: 60
    retry_sleep: 30.0
    retry_multiplier: 2.0
    connection_timeout: 120
  watchdog:
    transaction:
      timeout: 300
    callback:
      timeout: 300

datasources:
  metadata_atlasnet:
    kind: tzip_metadata
    url: https://dipdup-metadata-api.mavryk.network
    network: oxfordnet
  mvkt_atlasnet:
    kind: tezos.tzkt
    url: ${TZKT_URL:-https://atlasnet.api.mavryk.network}
    merge_subscriptions: true
    http:
      retry_count: 500
      retry_sleep: 30.0
      retry_multiplier: 2.0
      connection_timeout: 60
      batch_size: 10000




