spec_version: 3.0

package: equiteez

database:
  kind: postgres
  host: ${POSTGRES_HOST:-changeme}
  port: ${POSTGRES_PORT:-changeme}
  user: ${POSTGRES_USERNAME:-changeme}
  password: ${POSTGRES_PASSWORD:-changeme}
  database: ${POSTGRES_DB:-changeme}
  schema_name: public
  connection_timeout: 60
  
hasura:
  url: ${HASURA_URL:-changeme}
  admin_secret: ${ADMIN_SECRET:-changeme}
  select_limit: 1000
  rest: false
  http:
    retry_count: 60
    retry_sleep: 30.0
    retry_multiplier: 2.0

prometheus:
  host: 0.0.0.0
  port: 9090
  update_interval: 5

advanced:
  reindex:
    manual: wipe
    migration: exception
    rollback: ignore
    config_modified: ignore
    schema_modified: ignore

datasources:
  # NOTE: env var names changed during the basenet migration —
  # update deployment env: METADATA_BASENET_URL, MVKT_BASENET_URL
  # network slug stays 'oxfordnet' — the basenet metadata service
  # (https://metadata.basenet.mavryk.network) labels its data with the legacy slug
  metadata_basenet:
    kind: tzip_metadata
    url: ${METADATA_BASENET_URL:-changeme}
    network: oxfordnet
  mvkt_basenet:
    kind: tezos.tzkt
    url: ${MVKT_BASENET_URL:-changeme}
    merge_subscriptions: true
